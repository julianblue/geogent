name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: python (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [backend, agent]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check --output-format=github .

      - name: Mypy (advisory)
        run: uv run mypy src
        continue-on-error: true

      - name: Pytest
        run: uv run pytest

  migrations:
    name: migrations smoke (backend)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: geogent
          POSTGRES_PASSWORD: geogent
          POSTGRES_DB: geogent
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U geogent -d geogent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql+asyncpg://geogent:geogent@localhost:5432/geogent
      DATABASE_URL_SYNC: postgresql+psycopg://geogent:geogent@localhost:5432/geogent
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Alembic upgrade head
        run: uv run alembic upgrade head

  ui:
    name: ui
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.12.0"
          package_json_file: apps/ui/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Prettier check
        run: pnpm exec prettier --check .
      # `pnpm build` (next build) is intentionally omitted: the CopilotKit API
      # route initializes its runtime at module load, which fails Next.js'
      # build-time page-data collection without the configured backend env.
      # Fix in an app-level PR (force-dynamic route or lazy runtime init),
      # then re-enable here.
