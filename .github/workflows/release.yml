name: release

on:
  push:
    tags:
      - "geogent-backend-v*"
      - "geogent-agent-v*"
      - "geogent-ui-v*"

permissions:
  contents: read

jobs:
  publish:
    name: publish ${{ matrix.app }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            tag-prefix: geogent-backend-v
          - app: agent
            tag-prefix: geogent-agent-v
          - app: ui
            tag-prefix: geogent-ui-v
    steps:
      - name: Skip if tag does not match this app
        id: filter
        run: |
          if [[ "${GITHUB_REF_NAME}" == ${{ matrix.tag-prefix }}* ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            version="${GITHUB_REF_NAME#${{ matrix.tag-prefix }}}"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.filter.outputs.match == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.filter.outputs.match == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.filter.outputs.match == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.filter.outputs.match == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.filter.outputs.match == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/geogent-${{ matrix.app }}
          tags: |
            type=raw,value=${{ steps.filter.outputs.version }}
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.filter.outputs.version }}

      - name: Build and push
        if: steps.filter.outputs.match == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=geogent-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=geogent-${{ matrix.app }}

      - name: Attest build provenance
        if: steps.filter.outputs.match == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/geogent-${{ matrix.app }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
